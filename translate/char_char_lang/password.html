<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Required</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e15;
            --panel-color: #161925;
            --accent-glow: #ff0055; /* Security alert red/pink */
            --text-main: #f0f3f8;
            --text-muted: #7a889b;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .lock-container {
            width: 100%;
            max-width: 400px;
            background: var(--panel-color);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 85, 0.1);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 3px;
            transition: all 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--accent-glow), #a600ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        #error-msg {
            color: var(--accent-glow);
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="lock-container">
    <h1>RESTRICTED ACCESS</h1>
    <p>Enter decryption key to establish terminal session.</p>
    
    <input type="password" id="passkey" placeholder="••••••••" autocomplete="current-password">
    <button id="submit-btn">AUTHENTICATE</button>
    
    <div id="error-msg"></div>
</div>

<script>
    const PASSWORD = "YOUR_SECRET_PASSWORD"; // <-- Set your password here!
    const DEFAULT_REDIRECT = "index.html";     // <-- Where to send them after success

    const input = document.getElementById('passkey');
    const button = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');

    function checkPassword() {
        if (input.value === PASSWORD) {
            // Save the current timestamp to localStorage
            const sessionData = {
                authenticated: true,
                timestamp: new Date().getTime()
            };
            localStorage.setItem('gatekeeper_session', JSON.stringify(sessionData));
            
            // Send them back to the protected page they came from, or a default page
            const referrer = document.referrer;
            if (referrer && referrer !== window.location.href) {
                window.location.href = referrer;
            } else {
                window.location.href = DEFAULT_REDIRECT;
            }
        } else {
            errorMsg.innerText = "ACCESS DENIED: Invalid Passkey";
            input.value = "";
            input.focus();
        }
    }

    button.addEventListener('click', checkPassword);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });
</script>

</body>
</html>
