<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Video to Photos</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000; /* Dark background looks better for video */
            color: #fff;
            text-align: center;
        }
        .container {
            max-width: 90%;
            width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }
        video {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .desktop-btn {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. Replace with your actual video link -->
        <video id="my-video" controls playsinline src="https://github.com/lovelybeans/The_lovely_Beans.github.io/releases/download/a/IMG_2511.1.MOV"></video>
        
        <div id="instruction-box" class="instructions">
            Detecting your device...
        </div>
    </div>

    <script>
        function setupPageByDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const instructionBox = document.getElementById("instruction-box");
            const videoElement = document.getElementById("my-video");
            const videoUrl = videoElement.src;

            // Check for iOS
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                instructionBox.innerHTML = "<strong>To save to your Photos app:</strong><br>Tap and hold the video above, then select <strong>'Save Video'</strong> or <strong>'Add to Photos'</strong>.";
                return;
            }

            // Check for Android
            if (/android/i.test(userAgent)) {
                instructionBox.innerHTML = "<strong>To save to your Gallery:</strong><br>Tap and hold the video, then select <strong>'Download video'</strong>. It will automatically appear in your photos/gallery.";
                return;
            }

            // Desktop Fallback (Standard download button)
            instructionBox.innerHTML = `
                <p>You are on a desktop computer.</p>
                <a class="desktop-btn" href="${videoUrl}" download>Download Video File</a>
            `;
        }

        window.onload = setupPageByDevice;
    </script>
</body>
</html>
