<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading your app...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #0071e3;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #86868b; font-size: 16px; margin-bottom: 20px; }
        .fallback-link {
            color: #0071e3;
            text-decoration: none;
            font-weight: 500;
        }
        .fallback-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="spinner"></div>
    <h1>Detecting your device...</h1>
    <p id="status-message">Preparing your download links.</p>
    <div id="fallback-container" style="display: none;">
        <p>If your download didn't start automatically, choose your version:</p>
        <a id="manual-link" class="fallback-link" href="#">Download for your device</a>
    </div>
</div>

<script>
    // 1. Define your file URLs here
    const DOWNLOADS = {
        ios: "https://apps.apple.com/us/app/your-app-id",
        android: "https://play.google.com/store/apps/details?id=your.app.id",
        windows: "https://example.com/downloads/setup.exe",
        mac: "https://example.com/downloads/installer.dmg",
        linux: "https://example.com/downloads/app.AppImage",
        fallback: "https://example.com/downloads/all-versions" 
    };

    function detectDeviceAndRedirect() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const platform = navigator.userAgentData?.platform || navigator.platform || "";
        
        let downloadUrl = DOWNLOADS.fallback;
        let deviceName = "your device";

        // iOS Detection
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            downloadUrl = DOWNLOADS.ios;
            deviceName = "iOS";
        }
        // Android Detection
        else if (/android/i.test(userAgent)) {
            downloadUrl = DOWNLOADS.android;
            deviceName = "Android";
        }
        // macOS Detection (Handles newer iPads posing as Mac, too)
        else if (/Mac|MacIntel|MacPPC|Mac68K/.test(platform) || (navigator.maxTouchPoints > 1 && /Mac/.test(platform))) {
            downloadUrl = DOWNLOADS.mac;
            deviceName = "macOS";
        }
        // Windows Detection
        else if (/Win/.test(platform)) {
            downloadUrl = DOWNLOADS.windows;
            deviceName = "Windows";
        }
        // Linux Detection
        else if (/Linux/.test(platform)) {
            downloadUrl = DOWNLOADS.linux;
            deviceName = "Linux";
        }

        // Update UI status text
        document.getElementById('status-message').innerText = `Downloading the best version for ${deviceName}...`;
        
        // Setup manual fallback link just in case pop-up blockers trigger
        const manualLink = document.getElementById('manual-link');
        manualLink.href = downloadUrl;
        manualLink.innerText = `Click here to download for ${deviceName}`;
        document.getElementById('fallback-container').style.display = 'block';

        // Trigger the automatic download/redirect
        window.location.href = downloadUrl;
    }

    // Run detection immediately when the DOM is ready
    document.addEventListener("DOMContentLoaded", detectDeviceAndRedirect);
</script>

</body>
</html>
