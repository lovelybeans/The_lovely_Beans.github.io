<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Video</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 90%;
            width: 400px;
            box-sizing: border-box;
        }
        .file-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .file-info {
            color: #86868b;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background-color: #0071e3;
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0077ed;
        }
        .instructions {
            margin-top: 20px;
            background: #f5f5f7;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.88rem;
            text-align: left;
            line-height: 1.4;
            color: #515154;
        }
        ol {
            margin: 5px 0 0 20px;
            padding: 0;
        }
        li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="file-icon">🎬</div>
        <h2>Your Video Download</h2>
        <!-- Update the size text if needed so users know it's a big download -->
        <div class="file-info">Format: MP4 &bull; Size: ~1.5 GB</div>
        
        <!-- Put your GitHub Release URL in the href here -->
        <a id="download-btn" class="btn" href="https://github.com/lovelybeans/The_lovely_Beans.github.io/releases/download/a/IMG_2511.1.MOV" download>
            Download Video
        </a>
        
        <div id="instructions-box" class="instructions">
            <!-- Dynamic instructions will insert here -->
        </div>
    </div>

    <script>
        function setInstructions() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const box = document.getElementById("instructions-box");

            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                box.innerHTML = `
                    <strong>iPhone/iPad Instructions:</strong>
                    <ol>
                        <li>Tap the blue button above.</li>
                        <li>Confirm the download prompt in Safari/Chrome.</li>
                        <li>Once finished, open your phone's <strong>Files App</strong>.</li>
                        <li>Tap the video, press the <strong>Share Icon</strong> (bottom left), and tap <strong>"Save Video"</strong> to send it to your Photos app.</li>
                    </ol>
                `;
            } else if (/android/i.test(userAgent)) {
                box.innerHTML = `
                    <strong>Android Instructions:</strong>
                    <ol>
                        <li>Tap the blue button to begin downloading.</li>
                        <li>Because it is 1.5GB, check your notification shade for progress.</li>
                        <li>Once complete, it will automatically show up inside your <strong>Google Photos</strong> or <strong>Gallery</strong> app.</li>
                    </ol>
                `;
            } else {
                box.innerHTML = `<strong>Desktop Computer:</strong> Click the button above to save the file straight to your local hard drive.`;
            }
        }

        window.onload = setInstructions;
    </script>
</body>
</html>
